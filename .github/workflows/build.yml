name: Build & Release

# Builds Windows (.exe) and macOS (.app/.dmg) packages whenever a version tag
# (v*) is pushed, then uploads them to the GitHub Release for that tag.
#
# Manually trigger a release from your machine:
#   git tag v1.1.0
#   git push origin v1.1.0
# ...and the workflow builds + attaches both artifacts automatically.

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to attach artifacts to (must already exist)'
        required: true
        type: string

permissions:
  contents: write   # needed by gh release to upload assets

jobs:
  # ---------------------------------------------------------------------------
  build-windows:
    # ---------------------------------------------------------------------------
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install -r requirements/common.txt pywin32 pyinstaller pillow

      - name: Compile translations
        run: python build_i18n.py

      - name: Restore mpv player binary
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          mkdir -p bin
          # Fetch the latest static mpv build for Windows x86_64 from the
          # community-maintained zhongfly/mpv-winbuild release (recommended by
          # mpv.io). Asset names include a date + git hash, so resolve them via
          # the API rather than hard-coding a URL.
          ASSET_URL=$(gh api repos/zhongfly/mpv-winbuild/releases/latest \
            --jq '.assets[] | select(.name | startswith("mpv-x86_64-")) | select(.name | endswith(".7z")) | select(.name | startswith("mpv-x86_64-2026") or startswith("mpv-x86_64-2025")) | .url' | head -1)
          echo "mpv asset api url: $ASSET_URL"
          curl -L -H "Accept: application/octet-stream" \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            "$ASSET_URL" -o bin/mpv.7z
          # windows-latest ships 7-Zip as 7z.
          7z x bin/mpv.7z -obin -y
          # Place mpv.exe (and the bundled vulkan-1.dll if present) at bin/.
          find bin -name mpv.exe -exec cp {} bin/mpv.exe \; -quit
          ls -la bin/

      - name: Build with PyInstaller
        run: python -m PyInstaller MiniCast.spec --noconfirm

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: MiniCast-windows
          path: dist/MiniCast.exe
          if-no-files-found: error

      - name: Attach to release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ inputs.tag || github.ref_name }}"
          gh release upload "$TAG" dist/MiniCast.exe --clobber

  # ---------------------------------------------------------------------------
  build-macos:
    # ---------------------------------------------------------------------------
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install -r requirements/common.txt -r requirements/darwin.txt pyinstaller pillow

      - name: Install mpv (Homebrew)
        run: |
          # Install mpv so its binary + libs can be bundled into the .app,
          # giving macOS users the same "just works" experience as Windows
          # (no manual brew install required at runtime).
          brew install mpv
          echo "MPV_BIN=$(brew --prefix)/bin/mpv" >> "$GITHUB_ENV"

      - name: Compile translations
        run: python build_i18n.py

      - name: Generate icons (incl. .icns via iconutil)
        run: python make_icons.py

      - name: Build .app with PyInstaller
        env:
          MPV_BIN: ${{ env.MPV_BIN }}
        run: |
          # Stash the Homebrew mpv binary where the spec collects it, mirroring
          # the Windows bin/ layout so utils.mpv_default_path resolves it.
          mkdir -p bin
          cp "$MPV_BIN" bin/mpv
          python -m PyInstaller MiniCast-Mac.spec --noconfirm

      - name: Create .dmg
        run: |
          # Package the .app into a DMG for easy distribution.
          mkdir -p dist/dmg
          hdiutil create -volname "MiniCast" -srcfolder dist/MiniCast.app -ov -format UDZO dist/dmg/MiniCast.dmg

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: MiniCast-macos
          path: |
            dist/MiniCast.app
            dist/dmg/MiniCast.dmg
          if-no-files-found: error

      - name: Attach to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ inputs.tag || github.ref_name }}"
          gh release upload "$TAG" dist/dmg/MiniCast.dmg --clobber
