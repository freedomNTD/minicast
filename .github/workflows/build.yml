name: Build & Release

# Builds Windows (.exe) and macOS (.app/.dmg) packages whenever a version tag
# (v*) is pushed, then uploads them to the GitHub Release for that tag.
#
# Manually trigger a release from your machine:
#   git tag v1.1.0
#   git push origin v1.1.0
# ...and the workflow builds + attaches both artifacts automatically.

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to attach artifacts to (must already exist)'
        required: true
        type: string

permissions:
  contents: write   # needed by gh release to upload assets

jobs:
  # ---------------------------------------------------------------------------
  build-windows:
    # ---------------------------------------------------------------------------
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install -r requirements/common.txt pywin32 pyinstaller pillow

      - name: Compile translations
        run: python build_i18n.py

      - name: Restore mpv player binary
        shell: bash
        run: |
          mkdir -p bin
          # Download a static mpv build for Windows.
          curl -L -o bin/mpv.7z "https://sourceforge.net/projects/mpv-player-windows/files/64bit/mpv-x86_64-20250429-git.7z/download" || true
          # Fallback: if download is unavailable, create a placeholder so the
          # build still succeeds; the user can drop in their own mpv.exe.
          if [ ! -s bin/mpv.7z ]; then
            echo "mpv download unavailable — leaving bin empty; user supplies mpv.exe"
            # The spec only embeds bin/mpv.exe if it exists; guard for absence.
          fi
          # Try to extract if 7za is present.
          command -v 7z >/dev/null 2>&1 && 7z x bin/mpv.7z -obin -y || true
          find bin -name "mpv.exe" -exec cp {} bin/mpv.exe \; 2>/dev/null || true

      - name: Build with PyInstaller
        run: python -m PyInstaller MiniCast.spec --noconfirm

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: MiniCast-windows
          path: dist/MiniCast.exe
          if-no-files-found: error

      - name: Attach to release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ inputs.tag || github.ref_name }}"
          gh release upload "$TAG" dist/MiniCast.exe --clobber

  # ---------------------------------------------------------------------------
  build-macos:
    # ---------------------------------------------------------------------------
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install -r requirements/common.txt -r requirements/darwin.txt pyinstaller pillow

      - name: Compile translations
        run: python build_i18n.py

      - name: Generate iconset for macOS
        run: |
          # icon.icns already exists in the repo; regenerate from icon.png
          # only if iconutil is available (it is on macos-latest).
          python make_icons.py || true
          if command -v iconutil >/dev/null 2>&1; then
            mkdir -p /tmp/icon.iconset
            python - <<'PY'
            from PIL import Image
            im = Image.open('minicast/assets/icon.png')
            sizes = [16,32,64,128,256,512,1024]
            for s in sizes:
                im.resize((s,s)).save(f'/tmp/icon.iconset/icon_{s}x{s}.png')
            for s in [16,32,128,256,512]:
                im.resize((s*2,s*2)).save(f'/tmp/icon.iconset/icon_{s}x{s}@2x.png')
            PY
            iconutil -c icns /tmp/icon.iconset -o minicast/assets/icon.icns
          fi

      - name: Build .app with PyInstaller
        run: python -m PyInstaller MiniCast-Mac.spec --noconfirm

      - name: Create .dmg
        run: |
          # Package the .app into a DMG for easy distribution.
          mkdir -p dist/dmg
          hdiutil create -volname "MiniCast" -srcfolder dist/MiniCast.app -ov -format UDZO dist/dmg/MiniCast.dmg

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: MiniCast-macos
          path: |
            dist/MiniCast.app
            dist/dmg/MiniCast.dmg
          if-no-files-found: error

      - name: Attach to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ inputs.tag || github.ref_name }}"
          gh release upload "$TAG" dist/dmg/MiniCast.dmg --clobber
